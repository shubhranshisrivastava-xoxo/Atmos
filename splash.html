<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atmos</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<link rel="browse" href="browse.json">
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#A7C7E7,#EAF4FF);
    overflow:hidden;
}
.splash{
    text-align:center;
    animation:fadeOut 1s ease forwards;
    animation-delay:2s;
}
.splash img{
    width:170px;
    margin-bottom:20px;
}
.splash h1{
    font-family:'Poppins',sans-serif;
    font-size:58px;
    letter-spacing:10px;
    color:#1B2A4A;
}
@keyframes fadeOut{
    to{
        opacity:0;
        transform:scale(.9);
    }
}
</style>
</head>
<body>
<div class="splash">
<img src="logo.png">
<h1>ATMOS</h1>
</div>
<script>
setTimeout(function(){
window.location.href="index.html";
},2500);
</script>
</body>
</html>

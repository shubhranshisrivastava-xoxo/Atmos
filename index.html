<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="weather-card">
        <img
        id="weatherIcon"
        src=""
        alt="Weather Icon">
        <h1 id="temperature">
            --°
        </h1>
        <h2 id="description">
            Search any city
        </h2>
        <p id="cityName">
            📍 --
        </p>
        <p id="feelsLike">
            Feels like --°
        </p>
    </div>
    <div id="errorCard" class="hidden">
    <div class="error-icon">🔍</div>
    <h2>City not found</h2>
    <p>Check the spelling and try again.</p>
</div>
<div id="loadingCard" class="hidden">
    <div class="loader"></div>
    <p>Fetching weather...</p>
</div>
    <div class="search-box">
        <input
        type="text"
        id="cityInput"
        placeholder="Search any city...">
        <button id="searchBtn">
            🔍
        </button>
        <button id="locationBtn">
        📍
    </button>
    </div>
    <div id="recentSection" class="hidden">
    <h3>Recent Searches</h3>
    <div id="recentCities"></div>
</div>
    <div class="details">
        <div class="detail-box">
            <h3>💧 Humidity</h3>
            <p id="humidity">--%</p>
        </div>
        <div class="detail-box">
            <h3>🌬 Wind</h3>
            <p id="wind">-- km/h</p>
        </div>
        <div class="detail-box">
            <h3>👁 Visibility</h3>
            <p id="visibility">-- km</p>
        </div>
        <div class="detail-box">
            <h3>🌡 Pressure</h3>
            <p id="pressure">---- hPa</p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
